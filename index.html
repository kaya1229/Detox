<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>곤이 디톡스</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="setup-screen">
        <div class="logo">💖 GONY DETOX 💖</div>
        <div class="input-group">
            <label>곤듀들의 집중 시간(분)</label>
            <input type="number" id="work-time" value="50">
            <label>곤듀들의 휴식 시간(분)</label>
            <input type="number" id="rest-time" value="10">
        </div>
        <button id="start-btn">디톡스 시작(찡긋)</button>
    </div>

    <div id="detox-overlay" class="hidden">
        <div class="pink-filter"></div>
        <div class="content">
            <h1 id="text-top" class="typewriter"></h1>
            <div class="gony-container">
                <img src="gony.gif" id="gony-img"> <canvas id="heart-canvas"></canvas>
            </div>
            <h1 id="text-bottom" class="typewriter"></h1>
        </div>
    </div>

    <audio id="bgm" src="my_love.mp3" loop></audio> <script src="script.js"></script>
</body>
</html>
